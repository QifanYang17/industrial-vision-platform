# 一键拉起：推理 API + Gradio 演示 + MLflow 追踪服务（骨架占位）。
# 用法（在仓库根）：docker compose -f docker/docker-compose.yml up
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "python", "-m", "ivp.service.demo"]
    ports:
      - "7860:7860"   # Gradio 默认端口
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
    ports:
      - "5000:5000"
    volumes:
      - ../outputs:/mlflow   # sqlite 元数据 + 产物均落在挂载卷内
