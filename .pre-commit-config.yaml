# 提交前自动 lint + format，把问题挡在 commit 之前。
# 启用：uv run pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff          # lint，自动修可修项
        args: [--fix]
      - id: ruff-format   # format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files  # 防止误把数据集/权重提进 git
        args: [--maxkb=2048]
